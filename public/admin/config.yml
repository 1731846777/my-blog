backend:
  name: github
  repo: 1731846777/my-blog
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "📝 博客文章"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "分类", name: "categories", widget: "list"}
      - {label: "标签", name: "tags", widget: "list"}
      - {label: "摘要", name: "description", widget: "string", required: false}
      - {label: "封面图片", name: "image", widget: "image", required: false}
      - {label: "正文内容", name: "body", widget: "markdown"}